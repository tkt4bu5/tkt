<div></div>


<script>
    function updateTimer() {
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const seconds = now.getSeconds().toString().padStart(2, '0');
        const timeString = `${hours}:${minutes}:${seconds}`;
        document.getElementById('timer').textContent = timeString;
    }

    function updateTimeRemaining() {
        // this should be a count down from 45 minutes to 0
        const now = new Date();
        const end = new Date(now.getTime() + 45 * 60 * 1000);
        const hours = end.getHours().toString().padStart(2, '0');
        const minutes = end.getMinutes().toString().padStart(2, '0');
        const seconds = end.getSeconds().toString().padStart(2, '0');
        const timeString = `${hours}:${minutes}:${seconds}`;
        document.getElementById('time_remaining').textContent = timeString;
    }

    function startCountdown() {
        const timeRemainingElement = document.getElementById('time_remaining');
        let countdownTime = 43 * 60; // 43 minutes in seconds

        function updateTimer() {
            let hours = Math.floor(countdownTime / 3600);
            let minutes = Math.floor((countdownTime % 3600) / 60);
            let seconds = countdownTime % 60;

            // Format the time as 00:00:00
            let formattedTime =
                String(hours).padStart(2, '0') + ':' +
                String(minutes).padStart(2, '0') + ':' +
                String(seconds).padStart(2, '0');

            timeRemainingElement.textContent = formattedTime;

            if (countdownTime > 0) {
                countdownTime--;
                setTimeout(updateTimer, 1000);
            } else {
                timeRemainingElement.textContent = "00:00:00";
            }
        }

        updateTimer();
    }

    function setIssuedOn() {
        const issuedOnElement = document.getElementById('issued_on');
        const now = new Date();
        const previousDay = new Date(now);
        previousDay.setDate(now.getDate() - 1);

        const randomHour = Math.floor(Math.random() * 11) + 8; // Random hour between 8 and 18
        const randomMinute = Math.floor(Math.random() * 60); // Random minute between 0 and 59

        previousDay.setHours(randomHour);
        previousDay.setMinutes(randomMinute);
        previousDay.setSeconds(0);

        const day = String(previousDay.getDate()).padStart(2, '0');
        const month = String(previousDay.getMonth() + 1).padStart(2, '0'); // Months are zero-based
        const year = previousDay.getFullYear();
        const hours = String(previousDay.getHours()).padStart(2, '0');
        const minutes = String(previousDay.getMinutes()).padStart(2, '0');

        const formattedDate = `${day}/${month}/${year} ${hours}:${minutes}`;
        issuedOnElement.textContent = formattedDate;
    }

    function setActivatedOn() {
        const activateOnElement = document.getElementById('activate_on');
        const now = new Date();
        const activationTime = new Date(now.getTime() - 7 * 60 * 1000); // 7 minutes before current time

        const day = String(activationTime.getDate()).padStart(2, '0');
        const month = String(activationTime.getMonth() + 1).padStart(2, '0'); // Months are zero-based
        const year = activationTime.getFullYear();
        const hours = String(activationTime.getHours()).padStart(2, '0');
        const minutes = String(activationTime.getMinutes()).padStart(2, '0');
        const seconds = String(activationTime.getSeconds()).padStart(2, '0');

        const formattedDate = `${day}/${month}/${year} ${hours}:${minutes}:${seconds}`;
        activateOnElement.textContent = formattedDate;
    }


    // Start the countdown and set issued date when the page loads
    window.onload = function () {
        startCountdown();
        setIssuedOn();
        setActivatedOn();
    };

    setInterval(updateTimer, 1000);
</script>
</body>
